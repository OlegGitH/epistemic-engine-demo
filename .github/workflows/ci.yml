name: Food Lens CI
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run smoke
      - run: npm run evidence
      - name: Evaluate Epistemic release decision
        uses: OlegGitH/epistemic-engine/adapters/github-action@40839591d7c7056506767a18ba544fe2966a48df
        with:
          config: .epistemic.yaml
          certificate: .epistemic/certificate.json
      - name: Publish report and certificate to Epistemic dashboard
        if: always()
        env:
          EPISTEMIC_ENDPOINT: ${{ vars.EPISTEMIC_ENDPOINT }}
          EPISTEMIC_INGEST_TOKEN: ${{ secrets.EPISTEMIC_INGEST_TOKEN }}
          EPISTEMIC_AI_SYSTEM_ID: ${{ vars.EPISTEMIC_AI_SYSTEM_ID }}
        run: node scripts/publish-epistemic.mjs
      - name: Upload Epistemic evidence
        uses: actions/upload-artifact@v4
        with:
          name: food-lens-epistemic-evidence
          path: |
            .epistemic/ci-evidence.json
            .epistemic/project-quality.json
            .epistemic/certificate-report.md

  engine-scope:
    needs: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: epistemic
          POSTGRES_USER: epistemic
          POSTGRES_PASSWORD: epistemic
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U epistemic -d epistemic"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Check out Food Lens demo
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Check out pinned Epistemic Engine
        uses: actions/checkout@v4
        with:
          repository: OlegGitH/epistemic-engine
          ref: 7db1bd3d4f331347ec3e7c4309c312a74a7723fa
          path: .engine
      - uses: actions/setup-go@v5
        with:
          go-version-file: .engine/go.mod
          cache-dependency-path: .engine/go.sum
      - run: npm ci
      - name: Apply persistent schema
        env:
          PGPASSWORD: epistemic
        run: |
          for migration in .engine/db/migrations/*.up.sql; do
            psql -h 127.0.0.1 -U epistemic -d epistemic -v ON_ERROR_STOP=1 -f "$migration"
          done
      - name: Start isolated PostgreSQL-backed Epistemic Engine
        env:
          DATABASE_URL: postgres://epistemic:epistemic@127.0.0.1:5432/epistemic?sslmode=disable
          REQUIRE_DURABLE_STORAGE: "true"
        run: |
          cd .engine
          go build -o ../epistemic-control-plane ./apps/control-plane/cmd/server
          nohup ../epistemic-control-plane > ../epistemic-engine.log 2>&1 &
          echo $! > ../epistemic-engine.pid
          for attempt in $(seq 1 90); do
            if curl --fail --silent http://127.0.0.1:8080/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat ../epistemic-engine.log
          exit 1
      - name: Exercise full engine scope
        env:
          EPISTEMIC_REQUIRE_DURABLE: "true"
        run: npm run test:engine
      - name: Restart Engine and prove persisted account state
        env:
          DATABASE_URL: postgres://epistemic:epistemic@127.0.0.1:5432/epistemic?sslmode=disable
          REQUIRE_DURABLE_STORAGE: "true"
        run: |
          kill "$(cat epistemic-engine.pid)"
          for attempt in $(seq 1 30); do
            if ! curl --fail --silent http://127.0.0.1:8080/healthz >/dev/null; then break; fi
            sleep 1
          done
          nohup ./epistemic-control-plane >> epistemic-engine.log 2>&1 &
          echo $! > epistemic-engine.pid
          for attempt in $(seq 1 90); do
            if curl --fail --silent http://127.0.0.1:8080/healthz >/dev/null; then
              npm run test:persistence
              exit 0
            fi
            sleep 1
          done
          cat epistemic-engine.log
          exit 1
      - name: Upload full-scope report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: food-lens-engine-scope
          if-no-files-found: warn
          path: |
            .epistemic/engine-scope-report.json
            .epistemic/persistence-report.json
            epistemic-engine.log
